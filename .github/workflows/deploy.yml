name: Deploy — Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to tazo-web.com
    runs-on: ubuntu-latest
    # Only deploy when CI passed
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /root/TAARZIOEWLE-B

            echo "→ Syncing code with origin/main…"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # ── Build frontend ────────────────────────────────────────────
            echo "→ Building frontend…"
            export VITE_BUILD_TIME="$(date '+%d/%m/%Y %H:%M:%S')"
            export VITE_GIT_HASH="$(git rev-parse --short HEAD)"
            export VITE_GIT_MSG="$(git log -1 --pretty=%s)"
            cd frontend-public
            npm ci --prefer-offline --silent
            npm run build
            rsync -a --delete dist/. /var/www/tazo-web.com/
            cd ..

            # ── Rebuild backend services ───────────────────────────────────
            echo "→ Rebuilding backend services…"
            docker compose stop backend celery_worker celery_beat || true
            docker compose rm -f backend celery_worker celery_beat || true
            docker compose up -d --build --no-deps \
              backend celery_worker celery_beat

            echo "→ Health check…"
            for i in $(seq 1 12); do
              echo "Health check attempt $i..."
              RESPONSE="$(curl -sS https://tazo-web.com/api/v1/health || true)"
              if [ -n "$RESPONSE" ] && echo "$RESPONSE" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    assert d.get('database_ok') == True, 'DB unhealthy: ' + str(d)
    print('Health OK:', d)
    sys.exit(0)
except Exception as e:
    print('Health check error:', e)
    sys.exit(1)
"; then
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed after all retries. Last response: $RESPONSE"
                exit 1
              fi
              sleep 10
            done

            echo "→ Deploy complete ✓"
