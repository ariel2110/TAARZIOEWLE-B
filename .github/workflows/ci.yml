name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + pytest + import smoke check ──────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Tests (pytest)
        env:
          ENVIRONMENT: test
          USE_POSTGRES: "false"
          JWT_SECRET_KEY: ci-test-secret
          INTERNAL_KEY: ""
          ODIN_JWT_PUBLIC_KEY: ""
          MORNING_WEBHOOK_SECRET: test-morning-secret
          WHATSAPP_WEBHOOK_SECRET: test-wa-secret
          WHATSAPP_VERIFY_TOKEN: test-verify-token
        run: pytest tests/ -v --tb=short

      - name: Import check (no DB required)
        env:
          ENVIRONMENT: test
          USE_POSTGRES: "false"
          JWT_SECRET_KEY: ci-test-secret
          INTERNAL_KEY: ""
          ODIN_JWT_PUBLIC_KEY: ""
        run: python -c "from app.main import app; print('Import OK')"

  # ── Frontend Admin ────────────────────────────────────────────────────────
  frontend-admin:
    name: Frontend Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Frontend Customer ─────────────────────────────────────────────────────
  frontend-customer:
    name: Frontend Customer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-customer

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-customer/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Frontend Public ───────────────────────────────────────────────────────
  frontend-public:
    name: Frontend Public
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-public

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-public/package-lock.json
      - run: npm ci
      - run: npm run build
