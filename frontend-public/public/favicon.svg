  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.4"/>
  <!-- T letter -->
  <rect x="9" y="17" width="21" height="5" rx="2" fill="#F59E0B"/>
  <rect x="16" y="17" width="6" height="22" rx="2" fill="#F59E0B"/>
  <!-- W letter -->
  <polygon points="32,17 36,36 40,25 44,36 48,17 45,17 40,31 36,19.5 32,31 29,17" fill="#F59E0B"/>
  <!-- Gold dot bottom -->
  <circle cx="32" cy="50" r="2.5" fill="#F59E0B" opacity="0.8"/>
</svg>

