name: Deploy - Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to tazo-web.com
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [ -n "${SSH_HOST}" ] || { echo "Missing required secret: SSH_HOST"; exit 1; }
          [ -n "${SSH_USER}" ] || { echo "Missing required secret: SSH_USER"; exit 1; }
          if [ -z "${SSH_PASSWORD}" ] && [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Missing SSH auth secret: configure SSH_PASSWORD or SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PASSWORD == '' && secrets.SSH_PRIVATE_KEY || '' }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          debug: true
          script: |
            set -e
            cd /root/TAARZIOEWLE-B

            echo "Syncing code with origin/main..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "Building frontend..."
            export VITE_BUILD_TIME="$(date '+%d/%m/%Y %H:%M:%S')"
            export VITE_GIT_HASH="$(git rev-parse --short HEAD)"
            export VITE_GIT_MSG="$(git log -1 --pretty=%s)"
            cd frontend-public
            npm ci --prefer-offline --silent
            npm run build
            rsync -a --delete dist/. /var/www/tazo-web.com/
            cd ..

            echo "Rebuilding backend services..."
            docker compose stop backend celery_worker celery_beat || true
            docker compose rm -f backend celery_worker celery_beat || true
            docker compose up -d --build --no-deps backend celery_worker celery_beat

            echo "Health check..."
            for i in $(seq 1 12); do
              echo "Health check attempt $i..."
              RESPONSE="$(curl -sS https://tazo-web.com/api/v1/health || true)"
              DB_OK=$(echo "$RESPONSE" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get(\"database_ok\",False))" 2>/dev/null || echo "")
              if [ "$DB_OK" = "True" ]; then
                echo "Health OK: $RESPONSE"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed. Last response: $RESPONSE"
                exit 1
              fi
              sleep 10
            done

            echo "Deploy complete"