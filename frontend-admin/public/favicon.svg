<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded square background — brand indigo -->
  <rect width="64" height="64" rx="14" fill="#6366f1"/>

  <!-- Roof / gable — bold triangle -->
  <polygon points="32,10 8,34 56,34" fill="white" opacity="0.95"/>

  <!-- House body -->
  <rect x="16" y="34" width="32" height="20" rx="2" fill="white" opacity="0.95"/>

  <!-- Door — centered, indigo so it "punches through" -->
  <rect x="27" y="42" width="10" height="12" rx="2" fill="#6366f1"/>

  <!-- Left window -->
  <rect x="18" y="37" width="8" height="7" rx="1.5" fill="#6366f1" opacity="0.7"/>

  <!-- Right window -->
  <rect x="38" y="37" width="8" height="7" rx="1.5" fill="#6366f1" opacity="0.7"/>
</svg>
