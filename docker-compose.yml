services:
  postgres:
    image: postgres:16
    container_name: localbiz-postgres
    environment:
      POSTGRES_DB: localbiz
      POSTGRES_USER: localbiz
      POSTGRES_PASSWORD: localbiz
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U localbiz -d localbiz']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localbiz-backend
    env_file:
      - ./backend/.env.example
    environment:
      USE_POSTGRES: 'true'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: localbiz
      POSTGRES_USER: localbiz
      POSTGRES_PASSWORD: localbiz
      AUTO_CREATE_TABLES: 'false'
      AUTO_SEED_DEMO_DATA: 'false'
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
